<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCheck — iPhone Second Checklist</title>
    
    <!-- PWA Settings -->
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/7DF9C0/0a0a0f?text=iC">
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --border: #2a2a3a;
            --accent: #7DF9C0; --accent2: #4FC3F7; --danger: #FF6B6B; --warn: #FFD166;
            --text: #F0F0F8; --muted: #6b6b8a; --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
            min-height: 100vh; padding: 0 0 80px;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 80% 40% at 20% 0%, rgba(125,249,192,0.06) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(79,195,247,0.05) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .wrap { max-width: 680px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }

        header { padding: 36px 16px 0; max-width: 680px; margin: 0 auto; position: relative; z-index: 1; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .lang-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 3px; gap: 2px; }
        .lang-btn { background: none; border: none; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 100px; cursor: pointer; }
        .lang-btn.active { background: var(--accent); color: #0a0a0f; font-weight: 500; }
        .header-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; font-weight: 300; }

        .progress-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 24px; }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .progress-label { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; color: var(--muted); text-transform: uppercase; }
        .progress-count { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--accent); }
        .progress-bar-wrap { background: var(--surface2); border-radius: 100px; height: 8px; overflow: hidden; margin-bottom: 12px; }
        .progress-bar-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        .phase { margin-bottom: 20px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--surface); }
        .phase-header { display: flex; align-items: center; gap: 14px; padding: 18px 20px; cursor: pointer; user-select: none; }
        .phase-num { font-family: 'DM Mono', monospace; font-size: 11px; width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); flex-shrink: 0; }
        .phase.phase-complete .phase-num { background: var(--accent); border-color: var(--accent); color: #0a0a0f; }
        .phase-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .phase-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
        .phase-chevron { color: var(--muted); transition: transform 0.3s; font-size: 14px; }
        .phase.open .phase-chevron { transform: rotate(180deg); }
        .phase-body { display: none; border-top: 1px solid var(--border); }
        .phase.open .phase-body { display: block; }

        .check-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; }
        .check-item:last-child { border-bottom: none; }
        .check-item:hover { background: rgba(255,255,255,0.02); }
        .check-item.checked { opacity: 0.6; }
        .check-box { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
        .check-item.checked .check-box { background: var(--accent); border-color: var(--accent); }
        .check-icon { opacity: 0; font-size: 11px; color: #0a0a0f; }
        .check-item.checked .check-icon { opacity: 1; }
        .check-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
        .check-item.checked .check-title { text-decoration: line-through; color: var(--muted); }
        .check-desc { font-size: 12px; color: var(--muted); line-height: 1.5; font-weight: 300; }
        .check-tag { font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 8px; border-radius: 100px; border: 1px solid; letter-spacing: 0.5px; flex-shrink: 0; margin-top: 2px; }
        .tag-critical { border-color: rgba(255,107,107,0.5); color: var(--danger); background: rgba(255,107,107,0.08); }
        .tag-warn { border-color: rgba(255,209,102,0.5); color: var(--warn); background: rgba(255,209,102,0.08); }
        .tag-info { border-color: rgba(79,195,247,0.5); color: var(--accent2); background: rgba(79,195,247,0.08); }

        .verdict-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; text-align: center; background: var(--surface); display: none; }
        .verdict-card.show { display: block; }
        .verdict-emoji { font-size: 40px; margin-bottom: 12px; }
        .verdict-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; margin-bottom: 8px; }
        .verdict-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
        .verdict-layak .verdict-title { color: var(--accent); }
        .verdict-hati .verdict-title { color: var(--warn); }
        .verdict-tolak .verdict-title { color: var(--danger); }

        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn { padding: 11px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
        .btn-wa { background: #25D366; color: white; }
        .btn-copy { background: var(--surface2); color: var(--accent2); border: 1px solid rgba(79,195,247,0.3); }
        .btn-reset { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

            position: fixed; bottom: 20px; right: 20px; background
